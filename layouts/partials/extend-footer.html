<script>
document.addEventListener("keydown", function (e) {
  // Don't fire when typing in inputs or when search is open
  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || document.activeElement.isContentEditable) return;
  const searchWrapper = document.getElementById("search-wrapper");
  if (searchWrapper && !searchWrapper.classList.contains("invisible")) return;

  let link = null;

  if (e.key === "ArrowRight" || e.key === "j") {
    // List pagination: rel="next"
    link = document.querySelector('a[rel="next"]');
    // Article pagination: last link in article footer
    if (!link) {
      const footerLinks = document.querySelectorAll("article > footer a");
      if (footerLinks.length) link = footerLinks[footerLinks.length - 1];
    }
  } else if (e.key === "ArrowLeft" || e.key === "k") {
    // List pagination: rel="prev"
    link = document.querySelector('a[rel="prev"]');
    // Article pagination: first link in article footer
    if (!link) {
      const footerLinks = document.querySelectorAll("article > footer a");
      if (footerLinks.length) link = footerLinks[0];
    }
  }

  if (link) {
    e.preventDefault();
    window.location.href = link.href;
  }
});
</script>
